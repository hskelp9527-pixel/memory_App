<style>
        .leather-bg {
            background-color: #3a2e26;
            background-image: radial-gradient(#4a3b32 1px, transparent 0);
            background-size: 40px 40px;
            position: relative;
        }
        .grain-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            z-index: 100;
        }
        .vellum-sheet {
            box-shadow: 8px 12px 0px rgba(0, 0, 0, 0.3);
            mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' preserveAspectRatio='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,0 L100,0 L100,100 L0,100 Z' /%3E%3C/svg%3E");
            clip-path: polygon(1% 1%, 98% 2%, 99% 98%, 2% 99%, 0% 50%);
        }
        .tape {
            background: rgba(210, 196, 167, 0.4);
            backdrop-filter: blur(1px);
            width: 100px;
            height: 30px;
            transform: rotate(-5deg);
        }
        .stamp-btn {
            background: linear-gradient(145deg, #a44c40, #8a3a30);
            box-shadow: inset 1px 1px 2px rgba(255,255,255,0.2), 2px 2px 4px rgba(0,0,0,0.3);
        }
        .ink-line {
            border-bottom: 1px dashed rgba(74, 59, 50, 0.3);
        }
    </style>

<body class="leather-bg min-h-screen flex items-center justify-center p-8 overflow-hidden font-body text-on-surface">
<div class="grain-overlay"></div>
<!-- Top Navigation (Shell Implementation) -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-[#3a2e26] border-b border-dashed border-[#f5ebd9]/20 shadow-[0px_10px_20px_rgba(0,0,0,0.4)] flex justify-between items-center w-full px-6 py-4">
<div class="font-serif italic text-2xl tracking-tight text-[#f5ebd9] drop-shadow-[1px_1px_0px_rgba(0,0,0,0.5)]">Memory Vine</div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-[#f5ebd9] text-2xl cursor-pointer hover:bg-white/5 transition-colors p-1 rounded">account_circle</span>
</div>
</nav>
<!-- Main Registration Canvas -->
<main class="relative w-full max-w-2xl mt-16 flex flex-col items-center">
<!-- Decorative Tape Pieces -->
<div class="absolute -top-4 left-1/4 tape z-10 border-l border-r border-black/5"></div>
<div class="absolute -top-6 right-1/3 tape z-10 opacity-60 rotate-12 border-l border-r border-black/5"></div>
<!-- The Vellum Form -->
<div class="vellum-sheet bg-surface-container-low w-full p-12 md:p-20 relative overflow-hidden flex flex-col items-center">
<!-- Corner Vine Accent -->
<div class="absolute top-0 right-0 p-4 opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-6xl text-primary" style="font-variation-settings: 'FILL' 0, 'wght' 200;">potted_plant</span>
</div>
<!-- Header Section -->
<header class="text-center mb-12">
<h1 class="font-headline text-4xl text-primary mb-2 tracking-tight">开启记忆之书</h1>
<p class="font-hand text-3xl text-primary/80 transform -rotate-1">Create your Archive</p>
<div class="mt-6 flex justify-center opacity-40">
<span class="material-symbols-outlined text-4xl">history_edu</span>
</div>
</header>
<!-- Registration Form -->
<form class="w-full max-w-md space-y-8">
<!-- Field: User ID -->
<div class="group">
<label class="font-hand text-2xl text-primary/70 block mb-1 ml-1 transform -rotate-1">用户名 / Alias</label>
<div class="relative ink-line">
<input class="w-full bg-transparent border-none focus:ring-0 font-body text-xl py-2 px-0 text-on-surface placeholder:text-on-surface/30" placeholder="如何称呼您？" type="text"/>
<span class="material-symbols-outlined absolute right-0 bottom-2 text-on-surface/20">person</span>
</div>
</div>
<!-- Field: Email -->
<div class="group">
<label class="font-hand text-2xl text-primary/70 block mb-1 ml-1 transform rotate-1">电子邮件 / Correspondence</label>
<div class="relative ink-line">
<input class="w-full bg-transparent border-none focus:ring-0 font-body text-xl py-2 px-0 text-on-surface placeholder:text-on-surface/30" placeholder="信件往来地址" type="email"/>
<span class="material-symbols-outlined absolute right-0 bottom-2 text-on-surface/20">mail</span>
</div>
</div>
<!-- Field: Password -->
<div class="group">
<label class="font-hand text-2xl text-primary/70 block mb-1 ml-1 transform -rotate-1">密码 / Cypher</label>
<div class="relative ink-line">
<input class="w-full bg-transparent border-none focus:ring-0 font-body text-xl py-2 px-0 text-on-surface placeholder:text-on-surface/30" placeholder="档案锁钥" type="password"/>
<span class="material-symbols-outlined absolute right-0 bottom-2 text-on-surface/20">lock</span>
</div>
</div>
<!-- Field: Confirm Password -->
<div class="group">
<label class="font-hand text-2xl text-primary/70 block mb-1 ml-1 transform rotate-1">确认密码 / Re-verify</label>
<div class="relative ink-line">
<input class="w-full bg-transparent border-none focus:ring-0 font-body text-xl py-2 px-0 text-on-surface placeholder:text-on-surface/30" placeholder="再次确认钥扣" type="password"/>
<span class="material-symbols-outlined absolute right-0 bottom-2 text-on-surface/20">verified_user</span>
</div>
</div>
<!-- Terms/Privacy Fine Print -->
<div class="pt-4 flex items-start gap-3">
<input class="mt-1 bg-transparent border-primary/40 text-primary focus:ring-primary/20 rounded-sm" type="checkbox"/>
<p class="font-label text-xs uppercase tracking-widest text-on-surface/50 leading-relaxed">
                        我同意遵守 <span class="underline cursor-pointer">隐私账本</span> 与 <span class="underline cursor-pointer">档案使用条例</span>
</p>
</div>
<!-- Actions -->
<div class="flex flex-col items-center gap-6 pt-6">
<button class="stamp-btn px-12 py-4 rounded-sm text-on-primary-container font-headline text-2xl tracking-widest uppercase transition-all hover:scale-[1.02] active:scale-95 flex items-center gap-3" type="submit">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">approval</span>
                        创建档案
                    </button>
<a class="font-body italic text-primary/60 hover:text-primary transition-colors border-b border-primary/20 pb-0.5" href="#">
                        已有档案？以此处登入
                    </a>
</div>
</form>
<!-- Decorative Wax Seal / Postmark -->
<div class="absolute bottom-8 right-8 flex flex-col items-center opacity-60">
<div class="w-16 h-16 border-2 border-dashed border-primary/40 rounded-full flex items-center justify-center text-primary/40 rotate-12 mb-2">
<span class="material-symbols-outlined text-4xl">public</span>
</div>
<div class="font-label text-[10px] uppercase tracking-tighter text-primary/40">Established 1924</div>
</div>
<!-- Bottom Vine Accent -->
<div class="absolute bottom-0 left-0 p-4 opacity-20 pointer-events-none transform scale-x-[-1]">
<span class="material-symbols-outlined text-6xl text-primary" style="font-variation-settings: 'FILL' 0, 'wght' 200;">potted_plant</span>
</div>
</div>
</main>
<!-- Footer (Shell Implementation) -->
<footer class="fixed bottom-0 left-0 right-0 bg-[#3a2e26] border-t border-dashed border-[#f5ebd9]/10 flex flex-col md:flex-row justify-between items-center w-full px-8 py-6 gap-4 z-50">
<div class="font-mono text-[10px] uppercase tracking-widest text-[#f5ebd9]/60">© 1924 Memory Vine Archives</div>
<div class="flex gap-8">
<a class="font-mono text-[10px] uppercase tracking-widest text-[#f5ebd9]/40 hover:text-[#f5ebd9] transition-opacity" href="#">Privacy Ledger</a>
<a class="font-mono text-[10px] uppercase tracking-widest text-[#f5ebd9]/40 hover:text-[#f5ebd9] transition-opacity" href="#">Terms of Service</a>
<a class="font-mono text-[10px] uppercase tracking-widest text-[#f5ebd9]/40 hover:text-[#f5ebd9] transition-opacity" href="#">Archive Help</a>
</div>
</footer>
