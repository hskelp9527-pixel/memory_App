<style>
      .noise-overlay {
        pointer-events: none;
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: url('https://www.transparenttextures.com/patterns/p6.png');
        opacity: 0.03;
        z-index: 50;
      }
      .paper-shadow {
        box-shadow: 3px 4px 0px rgba(44, 38, 33, 0.15);
      }
      .leather-spine {
        background: linear-gradient(90deg, #2C2621 0%, #4A3B32 10%, #3a2e26 20%, #4A3B32 30%, #2C2621 100%);
      }
      .washi-tape {
        background: rgba(193, 158, 103, 0.4);
        backdrop-filter: blur(1px);
        transform: rotate(-3deg);
      }
      .ruled-lines {
        background-image: linear-gradient(#d2c4a7 1px, transparent 1px);
        background-size: 100% 2rem;
      }
      .ink-stamp {
        box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 2px 2px 0 rgba(0,0,0,0.2);
        border: 2px solid currentColor;
      }
      .stitching {
        background-image: linear-gradient(90deg, #d2c4a7 50%, transparent 50%);
        background-size: 10px 1px;
        background-repeat: repeat-x;
      }
    </style>

<body class="bg-surface min-h-screen flex items-center justify-center font-body selection:bg-secondary-container selection:text-on-secondary-container relative overflow-hidden">
<div class="noise-overlay"></div>
<!-- Main Journal Background Container -->
<div class="relative w-full max-w-4xl min-h-[650px] bg-primary flex overflow-hidden shadow-2xl m-4 md:rounded-lg">
<!-- Leather Spine Effect (Left Side) -->
<div class="w-12 md:w-20 leather-spine h-full border-r border-black/20 flex flex-col items-center py-10 gap-8">
<div class="w-1 h-20 bg-black/10 rounded-full"></div>
<div class="w-1 h-20 bg-black/10 rounded-full"></div>
<div class="w-1 h-20 bg-black/10 rounded-full"></div>
</div>
<!-- Main Content Area (Journal Page) -->
<main class="flex-1 relative flex flex-col items-center justify-center p-8 md:p-16">
<!-- Decorative Vines (Top Right) -->
<div class="absolute top-4 right-4 text-surface-container-high opacity-40 select-none">
<span class="material-symbols-outlined text-6xl">eco</span>
</div>
<!-- Login Form as Torn Paper / Postcard -->
<section class="relative bg-surface-bright p-8 md:p-12 w-full max-w-md transform rotate-1 paper-shadow border-l-[15px] border-surface-container-low">
<!-- Torn Top Edge simulation -->
<div class="absolute -top-3 left-0 w-full h-4 bg-surface-bright" style="clip-path: polygon(0% 100%, 5% 80%, 10% 100%, 15% 85%, 20% 100%, 25% 80%, 30% 100%, 35% 85%, 40% 100%, 45% 80%, 50% 100%, 55% 85%, 60% 100%, 65% 80%, 70% 100%, 75% 85%, 80% 100%, 85% 80%, 90% 100%, 95% 85%, 100% 100%);"></div>
<!-- Washi Tape Decor -->
<div class="absolute -top-6 left-1/2 -translate-x-1/2 w-32 h-8 washi-tape z-10 flex items-center justify-center">
<div class="w-full h-[1px] bg-black/5"></div>
</div>
<!-- Branding -->
<header class="mb-10 text-center relative">
<h1 class="font-headline text-3xl md:text-4xl text-on-surface font-bold tracking-tight">Memory Vine</h1>
<p class="font-hand text-2xl text-secondary mt-2">青藤记忆</p>
<!-- Postmark Deco -->
<div class="absolute -right-4 -top-6 w-16 h-16 border-2 border-secondary/30 rounded-full flex items-center justify-center text-secondary/30 text-[8px] font-label uppercase rotate-12 pointer-events-none">
<div class="text-center">
                            ARCHIVE<br/>1924<br/>MEMOIR
                        </div>
</div>
</header>
<!-- Login Form -->
<form class="space-y-8 relative ruled-lines pt-4">
<!-- Username Field -->
<div class="relative">
<label class="block font-hand text-3xl text-on-surface/80 mb-1" for="username">用户名</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-secondary transition-colors font-label placeholder:text-outline/40" id="username" placeholder="your_alias" type="text"/>
</div>
<!-- Password Field -->
<div class="relative">
<label class="block font-hand text-3xl text-on-surface/80 mb-1" for="password">密码</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-secondary transition-colors font-label placeholder:text-outline/40" id="password" placeholder="••••••••" type="password"/>
</div>
<!-- Actions -->
<div class="pt-6 flex flex-col items-center gap-6">
<button class="ink-stamp bg-secondary text-on-secondary px-10 py-3 font-headline text-xl font-bold tracking-widest active:scale-95 transition-transform" type="submit">
                            开启回忆
                        </button>
<div class="flex justify-between w-full font-label text-xs uppercase tracking-tighter text-on-surface-variant opacity-70">
<a class="hover:text-secondary hover:underline transition-all" href="#">忘记密码?</a>
<a class="hover:text-secondary hover:underline transition-all" href="#">注册新账号</a>
</div>
</div>
</form>
<!-- Corner Leaf Detail -->
<div class="absolute bottom-4 right-4 text-surface-container-high opacity-20">
<span class="material-symbols-outlined text-4xl transform rotate-45">filter_vintage</span>
</div>
</section>
<!-- Bottom Left Annotation -->
<div class="absolute bottom-10 left-10 hidden md:block">
<p class="font-hand text-xl text-surface-container-low -rotate-3 max-w-[180px] leading-relaxed opacity-60">
                    "每一个瞬间都值得被温柔地收藏在这里..."
                </p>
</div>
<!-- Wax Seal Decorative element -->
<div class="absolute -bottom-6 -right-6 w-24 h-24 bg-secondary rounded-full flex items-center justify-center shadow-lg transform rotate-12 border-4 border-secondary/50 outline outline-2 outline-offset-2 outline-secondary/30 hidden lg:flex">
<span class="material-symbols-outlined text-surface-bright text-4xl" data-weight="fill">history_edu</span>
<!-- Wax drips -->
<div class="absolute -top-1 left-4 w-4 h-6 bg-secondary rounded-full -z-10"></div>
<div class="absolute top-4 -left-1 w-6 h-4 bg-secondary rounded-full -z-10"></div>
</div>
</main>
</div>
<!-- Footer Cluster from JSON -->
<footer class="fixed bottom-0 w-full flex flex-col items-center gap-4 pb-8 font-mono text-xs uppercase tracking-widest text-stone-600">
<div class="flex gap-8">
<a class="text-stone-500 hover:underline transition-all active:scale-95" href="#">Privacy</a>
<a class="text-stone-500 hover:underline transition-all active:scale-95" href="#">Terms</a>
<a class="text-stone-500 hover:underline transition-all active:scale-95" href="#">Archives</a>
</div>
<p class="opacity-60 text-[10px]">© 1924-2024 Archival Society</p>
</footer>
