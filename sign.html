<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Memory Vine - Cover</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&amp;family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&amp;family=Courier+Prime&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2C2621",
                        "background-light": "#F2EAE1",
                        "background-dark": "#2C2621",
                        "polaroid": "#FCFAF7",
                        "stamp": "#A44C40",
                        "leather": "#4A3B32",
                    },
                    fontFamily: {
                        "display": ["Playfair Display", "serif"],
                        "hand": ["Caveat", "cursive"],
                        "type": ["Courier Prime", "monospace"]
                    },
                    boxShadow: {
                        'paper': '3px 4px 0px rgba(44, 38, 33, 0.15)',
                        'ink': '1px 1px 0px rgba(44, 38, 33, 0.4)',
                        'clasp': '0 4px 6px rgba(0,0,0,0.3), inset 0 1px 1px rgba(255,255,255,0.5)',
                        'book': '15px 15px 30px rgba(0,0,0,0.4), inset -5px -5px 15px rgba(0,0,0,0.2)'
                    },
                    backgroundImage: {
                        'brass': 'linear-gradient(to bottom, #f3e2c7 0%, #c19e67 50%, #b68d4c 51%, #e9d4b3 100%)',
                        'leather-texture': 'url("data:image/svg+xml,%3Csvg width=\'20\' height=\'20\' viewBox=\'0 0 20 20\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'%233a2e26\' fill-opacity=\'0.4\' fill-rule=\'evenodd\'%3E%3Ccircle cx=\'3\' cy=\'3\' r=\'3\'/%3E%3Ccircle cx=\'13\' cy=\'13\' r=\'3\'/%3E%3C/g%3E%3C/svg%3E")',
                        'noise': 'url("data:image/svg+xml,%3Csvg viewBox=\'0 0 200 200\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'noiseFilter\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.65\' numOctaves=\'3\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100%25\' height=\'100%25\' filter=\'url(%23noiseFilter)\'/%3E%3C/svg%3E")'
                    }
                },
            },
        }
    </script>
<style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        
        .book-cover-transition {
            transition: transform 1.5s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        
        .texture-overlay {
            mix-blend-mode: multiply;
            opacity: 0.15;
            pointer-events: none;
        }

        .emboss-text {
            color: #c19e67;
            text-shadow: -1px -1px 1px rgba(255,255,255,0.1), 1px 1px 2px rgba(0,0,0,0.8);
        }
        
        /* Simulating the open state for demonstration purposes via hover on a parent, 
           in a real app this would be triggered by JS classes */
        .group\/book:focus-within .book-cover-transition {
            transform: rotateY(-180deg);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center overflow-hidden font-display relative">
<!-- Global Noise Overlay -->
<div class="fixed inset-0 bg-noise opacity-[0.03] pointer-events-none z-50"></div>
<main class="w-full max-w-[1200px] h-[921px] flex items-center justify-center perspective-1000 relative">
<!-- Book Container -->
<div class="relative w-[600px] h-[800px] group/book transform-style-3d cursor-pointer" tabindex="0">
<!-- Book Spine (Left Edge) -->
<div class="absolute left-[-20px] top-0 w-[40px] h-full bg-[#3a2e26] rounded-l-lg shadow-[inset_10px_0_20px_rgba(0,0,0,0.5)] z-[-1]"></div>
<!-- Pages (Underneath Cover) -->
<div class="absolute right-[-10px] top-[10px] bottom-[10px] w-[20px] bg-[#f5ebd9] rounded-r-md flex flex-col justify-evenly py-4 z-[-2] border-r border-[#d2c4a7]">
<!-- Page lines -->
<div class="w-full h-px bg-[#d2c4a7] opacity-50"></div>
<div class="w-full h-px bg-[#d2c4a7] opacity-50"></div>
<div class="w-full h-px bg-[#d2c4a7] opacity-50"></div>
<div class="w-full h-px bg-[#d2c4a7] opacity-50"></div>
<div class="w-full h-px bg-[#d2c4a7] opacity-50"></div>
</div>
<!-- Front Cover -->
<div class="absolute inset-0 bg-leather bg-leather-texture rounded-r-lg shadow-book transform-origin-left book-cover-transition z-10 flex flex-col items-center justify-center overflow-hidden" style="transform-origin: left center;">
<!-- Inner Cover Shadow -->
<div class="absolute inset-0 shadow-[inset_0_0_50px_rgba(0,0,0,0.6)] pointer-events-none rounded-r-lg"></div>
<!-- Embossed Title Top -->
<h2 class="font-display font-bold text-3xl tracking-widest uppercase emboss-text mb-20 z-10">Memories</h2>
<!-- Cream Title Ribbon -->
<div class="relative w-full h-[120px] bg-polaroid shadow-paper flex items-center justify-center transform -rotate-2 z-20">
<div class="absolute inset-0 bg-noise opacity-10 pointer-events-none"></div>
<!-- Stitching -->
<div class="absolute top-2 left-0 right-0 h-px border-t border-dashed border-[#9ca3af] opacity-50"></div>
<div class="absolute bottom-2 left-0 right-0 h-px border-b border-dashed border-[#9ca3af] opacity-50"></div>
<h1 class="font-hand text-[#2c2621] text-6xl leading-none drop-shadow-sm transform -rotate-1">Our Story</h1>
</div>
<!-- Embossed Year Bottom -->
<div class="font-type text-lg emboss-text mt-24 z-10 tracking-widest">EST. 2024</div>
<!-- Brass Clasp (Right Edge) -->
<button aria-label="Open Scrapbook" class="absolute right-[-16px] top-1/2 -translate-y-1/2 w-[64px] h-[48px] bg-brass shadow-clasp rounded flex items-center justify-end pr-2 group-hover/book:scale-105 transition-transform duration-300 z-30 group-focus-within/book:opacity-0">
<div class="w-2 h-8 bg-black/20 rounded-full blur-[1px]"></div>
<span class="material-symbols-outlined text-[#3a2e26] opacity-60 ml-1 text-sm">lock_open</span>
</button>
<!-- Corner Protectors -->
<div class="absolute top-0 right-0 w-16 h-16 bg-brass rounded-bl-full shadow-md z-10" style="clip-path: polygon(100% 0, 100% 100%, 0 0);"></div>
<div class="absolute bottom-0 right-0 w-16 h-16 bg-brass rounded-tl-full shadow-md z-10" style="clip-path: polygon(100% 100%, 100% 0, 0 100%);"></div>
</div>
<!-- Inside Cover (Revealed on flip) -->
<!-- Normally handled by JS or complex CSS, simplified here for visual indication that it opens -->
<div class="absolute inset-0 bg-background-light shadow-inner z-0 flex items-center justify-center opacity-0 group-focus-within/book:opacity-100 transition-opacity duration-1000 delay-500">
<p class="font-hand text-3xl text-primary/50">Opening memories...</p>
</div>
</div>
</main>
<!-- Hint text below -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 font-type text-primary/60 text-sm tracking-wider">
        CLICK CLASP TO OPEN
    </div>
</body></html>
